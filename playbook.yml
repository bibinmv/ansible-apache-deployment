---
- name: Configure Apache Web Server
  hosts: web
  become: true

  tasks:

    - name: Install httpd package
      dnf:
        name: httpd
        state: present

    - name: Install firewalld package
      dnf:
        name: firewalld
        state: present

    - name: Ensure firewalld service is running
      service:
        name: firewalld
        state: started
        enabled: true

    - name: Allow HTTP service in firewall
      firewalld:
        service: http
        permanent: true
        state: enabled
        immediate: yes

    - name: Deploy custom index.html
      copy:
        content: "Web page hosting using Ansible - Deployed by Bibin"
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0644'
      notify: Restart httpd

    - name: Ensure httpd service is started and enabled
      service:
        name: httpd
        state: started
        enabled: true

  handlers:
    - name: Restart httpd
      service:
        name: httpd
        state: restarted
